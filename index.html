<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsha Bootstrap Template Demo</title>

    <!-- 리셋 및 공통 -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">

    <!-- 파트별 css 분할 -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/why-us.css">
    <link rel="stylesheet" href="css/services.css">
    <link rel="stylesheet" href="css/work-process.css">
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="css/team.css">
    <link rel="stylesheet" href="css/pricing.css">
    <link rel="stylesheet" href="css/testimonials.css">
    <link rel="stylesheet" href="css/faq.css">
    <link rel="stylesheet" href="css/subscribe.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>
    <!-- 1. 헤더 - 담당부원: 유채영 -->
    <header>
    </header>

    <!-- 2. Hero - 담당부원: 유채영 -->
    <section class="hero">
    </section>

    <main>
        <!-- 3. About - 담당부원: 유채영 -->
        <section class="about">
        </section>

        <!-- 4. Why us - 담당부원: 유채영 -->
        <section class="why-us">
        </section>

        <!-- 5. Services - 담당부원: 유채영 -->
        <section class="services">
        </section>

        <!-- 6. Work Process - 담당부원: 유채영 -->
        <section class="work-process">
        </section>

        <!-- 7. Call To Action - 담당부원: 유채영 -->
        <section class="call-to-answer">
        </section>

        <!-- 8. Portfolio - 담당부원: 홍연우 -->
        <section class="portfolio">
        </section>

        <!-- 9. Team - 담당부원: 정다희 -->
        <section class="team">
        </section>

        <!-- 10. Pricing - 담당부원: 정다희 -->
        <section class="pricing">
        </section>

        <!-- 11. Testimonials - 담당부원: 정다희 -->
        <section class="testimonials">
        </section>

        <!-- 12. Frequently Asked Questions - 담당부원: 이주헌 -->
        <section class="faq">
        </section>

        <!-- 13. Subscribe - 담당부원: 이주헌 -->
        <section class="subscribe">
        </section>

        <!-- 14. Recent Blog Post - 담당부원: 이주헌 -->
        <section class="blog">
        </section>

        <!-- 15. Contact - 담당부원: 유채영 -->
        <section class="contact">
            <section class="contact-main">
                <div class="contact-title-group">
                    <h2>CONTACT</h2> 
                    <!-- h2에 before/after 효과 -->
                </div>
                <div class="contact-form-group">
                    <div class="contact-left-info">
                        <div class="contact-info">
                            <div class="contact-info-address">
                                <svg xmlns="http://www.w3.org/2000/svg" class="contact-icon icon-location" viewBox="0 0 16 16">
                                    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
                                </svg>
                                <div class="address-txt">
                                    <h4>Address</h4>
                                    <p>A108 Adam Street, New York, NY 535022</p>
                                </div>
                            </div>

                            <div class="contact-info-call">
                                <svg xmlns="http://www.w3.org/2000/svg" class="contact-icon call-icon" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>
                                </svg>
                                <div class="call-txt">
                                    <h4>Call Us</h4>
                                    <p>+1 5589 55488 55</p>
                                </div>
                            </div>

                            <div class="contact-info-email">
                                <svg xmlns="http://www.w3.org/2000/svg" class="contact-icon email-icon" viewBox="0 0 16 16">
                                    <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                                </svg>
                                <div class="email-txt">
                                    <h4>Email Us</h4>
                                    <p>info@example.com</p>
                                </div>
                            </div>
                        </div>
                        <img src="/images/contact/map.png" alt="map-pic">
                    </div>
                    <div class="contact-right-input">
                        <form action="" method="POST" class="email-form">
                            <div class="input-row">
                                <div class="form-group">
                                    <label for="name">Your Name</label>
                                    <input type="text" id="name" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="email">Your Email</label>
                                    <input type="email" id="email" name="email" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="subject">Subject</label>
                                <input type="text" id="subject" name="subject" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="10" required></textarea>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn-submit"></button>submit
                            </div>
                        </form>
                    </div>
                    
                </div>
            </section>
            <section class="contact-join-news">
                <div class="contact-join-main"></div>
                <div class="contact-join-search">
                    <div></div>
                    <button class="contact-join-subscribe"></button>
                </div>
            </section>
        </section>
    </main>

    <!-- 16. Footer - 담당부원: 유채영 -->
    <footer>
    </footer>
</body>
</html>
